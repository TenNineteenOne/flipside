<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 9: Holo-Track Overlays (Base 3)</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .ambient-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at top right, rgba(139, 92, 246, 0.4) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Holo-border for the track list */
        .holo-container {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.1), 0 0 30px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-full pb-20">
    
    <div class="ambient-aura"></div>

    <div class="relative z-10 max-w-[500px] mx-auto p-4 flex flex-col gap-6 pt-12">
        <h1 class="font-display text-2xl font-bold mb-0 text-center tracking-widest uppercase text-white/50">Discovery</h1>
        
        <!-- Artist Card -->
        <div class="glass-card rounded-[36px] overflow-hidden flex flex-col pb-2 relative border border-t-[rgba(255,255,255,0.2)]">
            
            <!-- Hero covers almost everything -->
            <div class="relative h-[650px] w-full shrink-0">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-black/40 to-black/10"></div>
                
                <!-- Floating content over the image -->
                <div class="absolute inset-0 flex flex-col justify-end p-6 gap-6">
                    
                    <div class="flex flex-col gap-1 drop-shadow-[0_4px_10px_rgba(0,0,0,0.8)]">
                        <span class="text-[#c4b5fd] text-sm font-semibold tracking-wider flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-current"></span> Like Leon Bridges
                        </span>
                        <h2 class="font-display font-bold text-6xl tracking-tight text-white leading-[1.1]">Khruangbin</h2>
                    </div>

                    <!-- The Holographic Track List Overlay -->
                    <div class="holo-container rounded-3xl p-4 flex flex-col gap-3">
                        <div class="flex items-center justify-between px-1 mb-1">
                            <span class="text-[10px] uppercase font-bold tracking-[0.2em] text-[#a78bfa]">Top Tracks</span>
                            <span class="text-[10px] text-gray-400 font-medium">3 of 8</span>
                        </div>

                        <!-- Huge prominent row -->
                        <div class="bg-white/10 rounded-2xl p-2.5 flex items-center gap-4 hover:bg-white/20 transition-colors backdrop-blur-md border border-white/10 cursor-pointer">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-14 h-14 rounded-xl object-cover">
                            <div class="flex-1 min-w-0">
                                <div class="text-[16px] font-bold text-white leading-tight">Texas Sun</div>
                                <div class="text-[13px] text-gray-300 mt-0.5">Leon Bridges</div>
                            </div>
                            <button class="w-12 h-12 rounded-xl bg-white text-black flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                            </button>
                        </div>

                        <!-- Secondary row -->
                        <div class="flex items-center gap-4 px-2 py-1 cursor-pointer group">
                            <div class="text-sm font-bold text-gray-500 w-4 group-hover:text-white">2</div>
                            <div class="flex-1 text-[15px] font-semibold text-gray-300 group-hover:text-white transition-colors truncate">White Gloves</div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500 group-hover:text-white"><polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/></svg>
                        </div>
                        
                        <!-- Tertiary row -->
                        <div class="flex items-center gap-4 px-2 pb-1 cursor-pointer group">
                            <div class="text-sm font-bold text-gray-500 w-4 group-hover:text-white">3</div>
                            <div class="flex-1 text-[15px] font-semibold text-gray-500 group-hover:text-white transition-colors truncate">Mariella</div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500 group-hover:text-white"><polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/></svg>
                        </div>
                    </div>

                    <!-- Action Footer -->
                    <div class="flex gap-3 mt-2">
                        <button class="w-16 h-16 shrink-0 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white/50 hover:text-white transition-colors">
                           <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                        <button class="flex-1 bg-white text-black text-[16px] font-bold h-16 rounded-2xl border-none shadow-[0_0_40px_rgba(255,255,255,0.3)] flex items-center justify-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" class="text-[#8b5cf6]"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            Save Artist
                        </button>
                    </div>

                </div>
            </div>

        </div>

    </div>
</body>
</html>
