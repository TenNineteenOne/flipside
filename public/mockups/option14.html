<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 14: Carousel Cards with Tint</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .carousel-card {
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.4) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-full pb-20 items-center flex justify-center pt-8">
    <div class="w-[500px]">
        <div class="bg-black/60 border border-white/10 rounded-[32px] overflow-hidden flex flex-col pb-6">
            
            <div class="relative h-[280px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                <div class="absolute bottom-5 left-0 p-6">
                    <div class="font-display font-bold text-5xl">Khruangbin</div>
                </div>
            </div>

            <!-- Horizontal Cards with tint -->
            <div class="relative z-20 -mt-10 mb-4 h-[180px]">
                <div class="flex gap-4 overflow-x-auto hide-scroll px-6 snap-x snap-mandatory pt-4 pb-8">
                    
                    <div class="shrink-0 w-[260px] snap-center carousel-card rounded-3xl p-4 flex gap-4 cursor-pointer hover:scale-[1.02] transition-transform">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-20 h-20 rounded-xl object-cover shadow-lg border border-white/10">
                        <div class="flex-1 flex flex-col justify-center">
                            <div class="text-[#c4b5fd] text-[10px] font-bold uppercase tracking-widest mb-1">Track 1</div>
                            <div class="text-[16px] font-extrabold text-white leading-tight">Texas Sun</div>
                        </div>
                    </div>

                    <div class="shrink-0 w-[260px] snap-center bg-white/5 border border-white/10 rounded-3xl p-4 flex gap-4 cursor-pointer hover:scale-[1.02] transition-transform backdrop-blur-md">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100&q=80" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-center">
                            <div class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">Track 2</div>
                            <div class="text-[16px] font-semibold text-gray-300 leading-tight">White Gloves</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-6 pt-0 flex gap-3">
                <button class="flex-1 bg-white/5 border border-white/10 h-14 rounded-2xl text-white font-semibold">Pass</button>
                <button class="flex-1 bg-[#8b5cf6] text-black font-bold h-14 rounded-2xl shadow-[0_0_30px_rgba(139,92,246,0.3)] text-lg">Save</button>
            </div>
        </div>
    </div>
</body>
</html>
