<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 17: Cyberpunk Sharp Stack</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #fff;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .cyber-stack {
            position: relative;
        }

        .cyber-card {
            background: #000;
            border: 2px solid transparent;
            position: relative;
            z-index: 30;
            cursor: pointer;
            border-radius: 0;
            transition: transform 0.2s;
        }
        
        /* Neon border hack using pseudo-element for sharp lines */
        .cyber-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #8b5cf6 0%, transparent 60%);
            z-index: -1;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.8));
        }

        .cyber-card:hover { transform: translate(-4px, -4px); }

        .c-2 { position: absolute; top: 12px; left: 12px; right: -12px; height: 100%; background: #080808; border: 2px solid rgba(139, 92, 246, 0.3); z-index: 20; transition: transform 0.2s;}
        .c-3 { position: absolute; top: 24px; left: 24px; right: -24px; height: 100%; background: #0a0a0a; border: 2px solid rgba(139, 92, 246, 0.1); z-index: 10; transition: transform 0.2s;}

        .cyber-stack:hover .c-2 { transform: translate(4px, 4px); border-color: rgba(139, 92, 246, 0.6); }
        .cyber-stack:hover .c-3 { transform: translate(8px, 8px); border-color: rgba(139, 92, 246, 0.4); }

    </style>
</head>
<body class="min-h-full pb-20 items-center flex justify-center pt-8 bg-[#030303] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-purple-900/10 via-[#030303] to-[#030303]">
    
    <div class="relative z-10 w-[420px]">
        
        <!-- Stark Image header -->
        <div class="relative h-[400px] border-b-4 border-[#8b5cf6]">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover filter contrast-125 saturate-150">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            
            <div class="absolute top-6 left-6 font-display font-bold text-3xl tracking-widest uppercase text-white/20">Feed</div>

            <div class="absolute bottom-6 left-6">
                <div class="bg-[#8b5cf6] text-black text-xs font-bold uppercase tracking-widest px-2 py-1 inline-block mb-3">Psychedelic</div>
                <div class="font-display font-extrabold text-5xl text-white uppercase tracking-tighter">Khruangbin</div>
            </div>
        </div>

        <div class="p-8 pt-10">
            <!-- Cyber Stack -->
            <div class="cyber-stack h-[90px] w-[90%]">
                <div class="c-3 group">
                    <div class="absolute bottom-3 right-4 text-xs font-bold text-purple-900 group-hover:text-purple-500">TRACK 03</div>
                </div>
                <div class="c-2 group">
                    <div class="absolute bottom-3 right-4 text-xs font-bold text-purple-800 group-hover:text-purple-400">TRACK 02</div>
                </div>
                
                <div class="cyber-card w-full h-full p-3 flex items-center gap-4">
                    <div class="w-14 h-14 bg-[#111] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-full h-full object-cover filter contrast-125">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[14px] font-extrabold text-white uppercase tracking-wider">Texas Sun</div>
                        <div class="text-[11px] text-[#8b5cf6] font-bold tracking-widest uppercase mt-0.5">Leon Bridges</div>
                    </div>
                </div>
            </div>

            <!-- Action block -->
            <div class="mt-14 flex items-center justify-between border-t border-white/10 pt-6">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold max-w-[120px]">
                    Matched: <br><span class="text-white">Men I Trust</span>
                </div>

                <div class="flex gap-4">
                    <button class="w-12 h-12 bg-black border border-white/20 flex items-center justify-center text-white hover:text-red-500 hover:border-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <button class="w-12 h-12 bg-[#8b5cf6] border-none flex items-center justify-center text-black hover:bg-white transition-colors shadow-[0_0_20px_rgba(139,92,246,0.6)]">
                         <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
