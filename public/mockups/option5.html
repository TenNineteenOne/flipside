<!DOCTYPE html>
<html lang="en" class="dark h-[100dvh]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 5: Floating Swipe Cards</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #fff; overflow: hidden; height: 100dvh;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .card-stack {
            perspective: 1000px;
        }

        .swipe-card {
            box-shadow: 0 40px 100px -20px rgba(139, 92, 246, 0.4);
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="flex items-center justify-center relative">
    
    <!-- Background Blur -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=200&q=20" class="w-full h-full object-cover opacity-30 blur-[100px] scale-110">
    </div>

    <!-- Interface Wrapper -->
    <div class="relative z-10 w-full max-w-[420px] h-[85dvh] flex flex-col card-stack">
        
        <!-- Header -->
        <div class="flex justify-between items-center p-6 shrink-0">
            <h1 class="font-display text-2xl font-bold tracking-tight">Feed</h1>
            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md">
                <span class="text-xs font-bold text-gray-300">⚙️</span>
            </div>
        </div>
        
        <!-- Swipe Card -->
        <div class="swipe-card mx-6 flex-1 bg-[#1a1a1a] rounded-[36px] overflow-hidden flex flex-col relative border border-white/10">
            
            <div class="flex-1 relative">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>
                
                <div class="absolute bottom-0 left-0 p-6 w-full">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-[#8b5cf6]"></span>
                        <span class="text-xs font-bold uppercase tracking-wider text-gray-300 mix-blend-plus-lighter">Because of Men I Trust</span>
                    </div>
                    
                    <h2 class="font-display font-bold text-4xl mb-4 text-white">Khruangbin</h2>
                    
                    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-2 pr-4 flex items-center gap-3">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-10 h-10 rounded-xl object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="text-[14px] font-semibold text-white">Texas Sun</div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" class="text-[#8b5cf6]"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </div>
                </div>
            </div>

        </div>

        <!-- Floating Controls under card -->
        <div class="p-6 pt-8 flex justify-center gap-6 shrink-0 relative z-20">
            <button class="w-16 h-16 rounded-full bg-black/40 border border-red-500/30 text-red-400 flex items-center justify-center backdrop-blur-xl shadow-lg hover:bg-red-500/20 hover:scale-110 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <button class="w-16 h-16 rounded-full bg-black/40 border border-[#8b5cf6]/50 text-[#8b5cf6] flex items-center justify-center backdrop-blur-xl shadow-lg hover:bg-[#8b5cf6]/20 hover:scale-110 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
        </div>

    </div>
</body>
</html>
