<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 3: Neon Glassmorphism</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        /* The Aura Background */
        .ambient-aura {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.4) 0%, rgba(139, 92, 246, 0) 60%);
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-full relative">
    
    <div class="ambient-aura"></div>

    <div class="relative z-10 max-w-[500px] mx-auto p-4 flex flex-col gap-8 pt-12">
        <h1 class="font-display text-4xl mb-4 text-center tracking-tight">Flipside</h1>
        
        <!-- Artist Card -->
        <div class="glass-card rounded-[32px] overflow-hidden">
            
            <div class="relative h-[400px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6">
                    <div class="text-purple-300 text-sm font-semibold uppercase tracking-widest mb-1">Psychedelic Rock</div>
                    <div class="font-display font-bold text-5xl tracking-tight text-white drop-shadow-md">Khruangbin</div>
                </div>
            </div>

            <div class="p-6 flex flex-col gap-5">
                <div class="text-base text-gray-300">Because you listen to Men I Trust and Leon Bridges</div>
                
                <div class="bg-white/10 border border-white/20 rounded-2xl p-3 flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-12 h-12 rounded-xl object-cover shadow-lg">
                    <div class="flex-1 min-w-0">
                        <div class="text-[15px] font-semibold text-white truncate">Texas Sun</div>
                        <div class="text-[13px] text-gray-400">+ 4 more tracks</div>
                    </div>
                    <button class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </button>
                </div>

                <div class="pt-2 flex gap-3">
                    <button class="flex-1 bg-white/5 border border-white/10 text-white text-sm font-medium h-14 rounded-2xl backdrop-blur-md">👎 Pass</button>
                    <button class="flex-1 bg-white text-black text-sm font-bold h-14 rounded-2xl border-none drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">Save to flipside</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
