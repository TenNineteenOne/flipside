<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 2: Immersive Grid</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: #eee; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-full">
    <div class="max-w-[1400px] mx-auto p-6 pt-12 flex flex-col md:flex-row gap-12">
        <div class="w-full md:w-64 shrink-0 flex flex-col gap-6 sticky top-12 h-fit">
            <h1 class="font-display text-4xl mb-4">Flipside</h1>
            <nav class="flex flex-col gap-2">
                <a href="#" class="px-4 py-3 rounded-lg bg-white/10 font-medium">✨ Discovery Feed</a>
                <a href="#" class="px-4 py-3 rounded-lg text-gray-500 hover:text-white transition-colors">❤️ Saved Artists</a>
                <a href="#" class="px-4 py-3 rounded-lg text-gray-500 hover:text-white transition-colors">⚙️ Settings</a>
            </nav>
        </div>
        
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Cards Array -->
            <div class="bg-[#0f0f0f] border border-white/10 rounded-2xl overflow-hidden cursor-pointer flex flex-col">
                <div class="relative h-[250px]">
                    <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=500&q=80" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] via-black/40 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-5">
                        <div class="font-display font-bold text-3xl">Khruangbin</div>
                    </div>
                </div>
                <div class="p-5 flex flex-col gap-4 flex-1">
                    <div class="text-sm text-gray-400 flex-1">Because you listen to Men I Trust</div>
                    
                    <div class="bg-[#8b5cf6]/10 border border-[#8b5cf6]/20 rounded-xl p-2 flex items-center gap-3">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-8 h-8 rounded-md object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="text-[12px] font-medium text-gray-200 truncate">Texas Sun</div>
                        </div>
                        <button class="w-8 h-8 rounded-full bg-[#8b5cf6] text-black flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                        </button>
                    </div>

                    <div class="flex gap-2 mt-2">
                        <button class="flex-1 border border-white/10 text-gray-400 text-xs h-10 rounded-lg">👎 Pass</button>
                        <button class="flex-1 bg-[#8b5cf6] text-black text-xs font-semibold h-10 rounded-lg">Save</button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-[#0f0f0f] border border-white/10 rounded-2xl overflow-hidden cursor-pointer flex flex-col">
                <div class="relative h-[250px]">
                    <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5f5f921?w=500&q=80" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] via-black/40 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-5">
                        <div class="font-display font-bold text-3xl">Leon Bridges</div>
                    </div>
                </div>
                <div class="p-5 flex flex-col gap-4 flex-1">
                    <div class="text-sm text-gray-400 flex-1">Because you love R&B</div>
                    
                    <div class="bg-[#0ea5e9]/10 border border-[#0ea5e9]/20 rounded-xl p-2 flex items-center gap-3">
                        <div class="w-8 h-8 bg-gray-800 rounded-md"></div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[12px] font-medium text-gray-200 truncate">River</div>
                        </div>
                        <button class="w-8 h-8 rounded-full bg-[#0ea5e9] text-black flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                        </button>
                    </div>

                    <div class="flex gap-2 mt-2">
                        <button class="flex-1 border border-white/10 text-gray-400 text-xs h-10 rounded-lg">👎 Pass</button>
                        <button class="flex-1 bg-[#0ea5e9] text-black text-xs font-semibold h-10 rounded-lg">Save</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
