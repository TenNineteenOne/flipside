<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 1: Premium Upscale</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: #eee; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-full">
    <div class="max-w-[640px] mx-auto p-4 flex flex-col gap-6 pt-12">
        <h1 class="font-display text-4xl mb-4 text-center">Feed</h1>
        
        <!-- Artist Card -->
        <div class="bg-[#0f0f0f] border border-white/10 rounded-2xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-colors">
            
            <div class="relative h-[300px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] via-black/40 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-5">
                    <div class="text-purple-400 text-xs font-semibold uppercase tracking-wider mb-2">Psychedelic Rock</div>
                    <div class="font-display font-bold text-4xl leading-tight">Khruangbin</div>
                </div>
            </div>

            <div class="p-5 flex flex-col gap-4">
                <div class="text-sm text-gray-400">Because you listen to Men I Trust and Leon Bridges</div>
                
                <div class="flex flex-wrap gap-2">
                    <span class="text-xs font-medium uppercase bg-[#141414] border border-[#1e1e1e] text-gray-400 px-3 py-1.5 rounded-md">Funk</span>
                    <span class="text-xs font-medium uppercase bg-[#141414] border border-[#1e1e1e] text-gray-400 px-3 py-1.5 rounded-md">Instrumental</span>
                </div>

                <div class="mt-2 bg-[#8b5cf6]/10 border border-[#8b5cf6]/20 rounded-xl p-3 flex items-center gap-4 cursor-pointer hover:bg-[#8b5cf6]/15 transition-colors">
                    <div class="flex -space-x-3 items-center shrink-0">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="relative z-10 w-10 h-10 rounded-lg border-2 border-black object-cover">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100&q=80" class="relative z-0 w-10 h-10 rounded-lg border-2 border-black object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[14px] font-medium text-gray-200 truncate">▶ Texas Sun</div>
                        <div class="text-[12px] text-gray-500">+ 4 more tracks</div>
                    </div>
                    <button class="w-12 h-12 rounded-full bg-[#8b5cf6] text-black flex items-center justify-center shrink-0 hover:scale-105 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </button>
                </div>
            </div>

            <div class="p-4 pt-0 flex gap-3">
                <button class="flex-1 bg-transparent border border-white/10 text-gray-400 text-sm font-medium h-12 rounded-xl hover:bg-white/5 transition-colors">👎 Not for me</button>
                <button class="flex-1 bg-[#8b5cf6] text-black text-sm font-semibold h-12 rounded-xl border-none hover:bg-purple-400 transition-colors">+ Save</button>
            </div>
        </div>

    </div>
</body>
</html>
