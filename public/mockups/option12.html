<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 12: Minimal Edge-Lit Flow (Refined 7)</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .ambient-aura {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.45) 0%, rgba(139, 92, 246, 0) 65%);
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        /* Edge-Lit Track styling */
        .edge-lit-row {
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        
        .edge-lit-row:hover {
            background-color: rgba(255,255,255,0.03);
            border-top-color: #8b5cf6;
            box-shadow: inset 0 20px 20px -20px rgba(139, 92, 246, 0.3);
        }

        /* The very first row has a prominent accent color line */
        .edge-lit-row.featured {
            border-top: 2px solid #8b5cf6;
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
        }
    </style>
</head>
<body class="min-h-full pb-20">
    
    <div class="ambient-aura"></div>

    <div class="relative z-10 max-w-[500px] mx-auto p-4 flex flex-col pt-12">
        <h1 class="font-display text-4xl mb-4 text-center tracking-tight text-white drop-shadow-md">Flipside</h1>
        
        <!-- Artist Card -->
        <div class="glass-card rounded-[32px] overflow-hidden flex flex-col pb-6">
            
            <div class="relative h-[300px] shrink-0">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6">
                    <div class="text-purple-400 text-[11px] font-bold uppercase tracking-[0.2em] mb-2 drop-shadow-md">Psychedelic Rock</div>
                    <div class="font-display font-bold text-5xl tracking-tight text-white drop-shadow-lg">Khruangbin</div>
                </div>
            </div>

            <div class="mt-0 z-20 flex flex-col w-full">
                
                <!-- Track 1 -->
                <div class="edge-lit-row featured px-6 py-4 flex items-center gap-4 cursor-pointer">
                    <div class="w-6 text-center font-display text-lg font-bold text-[#8b5cf6]">1</div>
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-12 h-12 rounded-md object-cover shadow-lg border border-white/20">
                    <div class="flex-1 min-w-0">
                        <div class="text-[17px] font-bold text-white truncate">Texas Sun</div>
                        <div class="text-[13px] text-gray-400 mt-0.5">Leon Bridges</div>
                    </div>
                </div>

                <!-- Track 2 -->
                <div class="edge-lit-row px-6 py-3 flex items-center gap-4 cursor-pointer">
                    <div class="w-6 text-center text-sm font-bold text-gray-500">2</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[15px] font-semibold text-gray-300 truncate">White Gloves</div>
                    </div>
                    <div class="text-xs text-gray-500">3:14</div>
                </div>
                
                <!-- Track 3 -->
                <div class="edge-lit-row px-6 py-3 flex items-center gap-4 cursor-pointer">
                    <div class="w-6 text-center text-sm font-bold text-gray-500">3</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[15px] font-semibold text-gray-300 truncate">Mariella</div>
                    </div>
                    <div class="text-xs text-gray-500">5:22</div>
                </div>
                
                <!-- Track 4 -->
                <div class="edge-lit-row px-6 py-3 flex items-center gap-4 cursor-pointer">
                    <div class="text-xs text-gray-400 w-full text-center">Show 2 more tracks</div>
                </div>

            </div>

             <div class="px-6 pt-6 pb-2 flex flex-col gap-6">
                <div class="flex justify-between items-center px-2">
                    <div class="text-[12px] text-gray-400 uppercase tracking-wider font-bold">
                        Matching Reason
                    </div>
                    <div class="text-[12px] text-gray-300 border border-white/20 px-2 py-1 rounded-md">
                        Men I Trust
                    </div>
                </div>

                <div class="flex gap-3">
                    <button class="flex-1 bg-white/5 border border-white/10 text-gray-300 text-sm font-semibold h-14 rounded-2xl hover:bg-white/10 transition-colors">👎 Pass</button>
                    <button class="flex-1 bg-[#8b5cf6] text-black text-sm font-bold h-14 rounded-2xl shadow-[0_0_20px_rgba(139,92,246,0.4)]">Save Artist</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
