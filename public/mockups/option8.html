<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 8: Neon Track Carousel (Base 3)</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .ambient-aura {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.4) 0%, rgba(139, 92, 246, 0) 50%);
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="min-h-full pb-20">
    
    <div class="ambient-aura"></div>

    <div class="relative z-10 max-w-[500px] mx-auto p-4 flex flex-col gap-6 pt-10">
        <h1 class="font-display text-3xl mb-0 text-center tracking-tight text-white/90">Flipside</h1>
        
        <div class="glass-card rounded-[32px] overflow-hidden flex flex-col pt-0 shadow-2xl">
            
            <div class="relative h-[280px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/90"></div>
                
                <div class="absolute bottom-0 w-full p-6 text-center">
                    <div class="font-display font-bold text-5xl tracking-tight text-white drop-shadow-md">Khruangbin</div>
                    <div class="text-[#8b5cf6] text-xs font-bold uppercase tracking-widest mt-2 bg-black/40 inline-block px-3 py-1 rounded-full backdrop-blur-md">Similar to Men I Trust</div>
                </div>
            </div>

            <!-- Horizontal Track Slider (The Pop!) -->
            <div class="py-6 bg-black/30 border-y border-white/5 relative overflow-hidden">
                <div class="absolute inset-y-0 left-0 w-8 bg-gradient-to-r from-[#141414] to-transparent z-10"></div>
                <div class="absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-[#141414] to-transparent z-10"></div>

                <div class="flex gap-4 overflow-x-auto hide-scroll px-6 snap-x snap-mandatory pb-2">
                    
                    <!-- Slide 1 -->
                    <div class="shrink-0 w-[240px] snap-center bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center gap-3 backdrop-blur-md hover:bg-white/10 transition-colors cursor-pointer group">
                        <div class="relative w-28 h-28 rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(139,92,246,0.3)]">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=200&q=80" class="w-full h-full object-cover">
                            <!-- Play overlay -->
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="text-center w-full">
                            <div class="text-[16px] font-bold text-white truncate">Texas Sun</div>
                            <div class="text-[12px] text-gray-400 mt-1 uppercase tracking-wider font-semibold">1 · Leon Bridges</div>
                        </div>
                    </div>

                    <!-- Slide 2 -->
                    <div class="shrink-0 w-[240px] snap-center bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center gap-3 backdrop-blur-md hover:bg-white/10 transition-colors cursor-pointer group">
                        <div class="relative w-28 h-28 rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                            <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&q=80" class="w-full h-full object-cover">
                            <!-- Play overlay -->
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                </div>
                            </div>
                        </div>
                        <div class="text-center w-full">
                            <div class="text-[16px] font-bold text-gray-300 truncate">White Gloves</div>
                            <div class="text-[12px] text-gray-500 mt-1 uppercase tracking-wider font-semibold">2</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 pt-5 grid grid-cols-2 gap-4">
                <button class="bg-transparent border border-white/20 text-white text-[15px] font-bold h-14 rounded-2xl backdrop-blur-md">Pass</button>
                <button class="bg-[#8b5cf6] text-black text-[15px] font-bold h-14 rounded-2xl shadow-[0_0_20px_rgba(139,92,246,0.3)] hover:brightness-110">Save Artist</button>
            </div>
        </div>

    </div>
</body>
</html>
