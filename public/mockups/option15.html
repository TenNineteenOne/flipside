<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 15: Glowing Album Art Stack</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }

        .album-stack {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .art-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .l-1 { z-index: 30; box-shadow: 0 10px 40px rgba(139, 92, 246, 0.7); }
        .l-2 { z-index: 20; transform: translate(12px, 12px) scale(0.9); filter: brightness(0.6) sepia(1) hue-rotate(220deg); }
        .l-3 { z-index: 10; transform: translate(24px, 24px) scale(0.8); filter: brightness(0.3) sepia(1) hue-rotate(220deg); }

        .stack-row:hover .l-2 { transform: translate(16px, -10px) scale(0.9) rotate(5deg); filter: brightness(0.9); }
        .stack-row:hover .l-3 { transform: translate(32px, -2px) scale(0.8) rotate(10deg); filter: brightness(0.6); }

        .bg-glow {
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
        }
    </style>
</head>
<body class="min-h-full pb-20 items-center flex justify-center pt-8">
    
    <div class="w-[500px] border border-white/10 rounded-[32px] overflow-hidden bg-[#0A0A0A] relative">
        <div class="absolute inset-0 bg-glow z-0"></div>
        
        <div class="relative z-10">
            <div class="relative h-[250px]">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0A] to-transparent"></div>
                <div class="absolute bottom-2 left-6">
                    <div class="font-display font-bold text-5xl tracking-tight text-white">Khruangbin</div>
                </div>
            </div>

            <!-- The Artwork Stack Row -->
            <div class="p-8 pb-4 flex items-center gap-12 stack-row cursor-pointer mt-4">
                <div class="album-stack shrink-0">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=200&q=80" class="art-layer l-1">
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&q=80" class="art-layer l-2">
                    <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=200&q=80" class="art-layer l-3 bg-black">
                </div>
                
                <div class="flex-1 pl-4">
                    <div class="text-[#8b5cf6] font-bold text-sm uppercase tracking-widest mb-1 shadow-sm">Hot Tracks</div>
                    <div class="text-3xl font-display font-bold leading-none mb-2 text-white drop-shadow-md">Texas Sun</div>
                    <div class="text-gray-400 font-medium text-sm">+ 4 more tracks</div>
                </div>
            </div>

            <div class="p-6 mt-8 flex gap-4">
                <button class="bg-black border border-white/20 text-white w-full h-16 rounded-2xl font-bold hover:bg-white/10 transition-colors cursor-pointer">Skip Menu</button>
                <button class="bg-gradient-to-r from-[#7c3aed] to-[#8b5cf6] text-white w-full h-16 rounded-2xl font-bold shadow-[0_0_40px_rgba(139,92,246,0.5)] cursor-pointer text-lg">Heart Artist</button>
            </div>
        </div>
    </div>
</body>
</html>
