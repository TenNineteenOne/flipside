<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option 7: Dynamic Track Stack (Base 3)</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden;}
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .ambient-aura {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.45) 0%, rgba(139, 92, 246, 0) 65%);
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .track-row {
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .track-row:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 15px 30px rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-full pb-20">
    
    <div class="ambient-aura"></div>

    <div class="relative z-10 max-w-[500px] mx-auto p-4 flex flex-col gap-8 pt-12">
        <h1 class="font-display text-4xl mb-2 text-center tracking-tight text-white drop-shadow-md">Flipside</h1>
        
        <!-- Artist Card -->
        <div class="glass-card rounded-[32px] overflow-hidden flex flex-col pb-6">
            
            <div class="relative h-[320px] shrink-0">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6">
                    <div class="text-purple-400 text-[11px] font-bold uppercase tracking-[0.2em] mb-2 drop-shadow-md pb-1">Psychedelic Rock</div>
                    <div class="font-display font-bold text-5xl tracking-tight text-white drop-shadow-lg">Khruangbin</div>
                </div>
            </div>

            <!-- "Popping" Track Stack Overlaying the Image slightly -->
            <div class="px-5 -mt-6 z-20 flex flex-col gap-3">
                <div class="text-xs font-semibold uppercase tracking-widest text-gray-400 pl-2 mb-1">Top Tracks</div>
                
                <!-- Track 1 (Featured) -->
                <div class="track-row rounded-2xl p-3 flex items-center gap-4 cursor-pointer">
                    <div class="relative w-14 h-14 shrink-0">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&q=80" class="w-full h-full rounded-xl object-cover shadow-lg border border-white/20">
                        <div class="absolute -right-2 -bottom-2 w-7 h-7 bg-[#8b5cf6] rounded-full flex items-center justify-center text-black shadow-[0_0_15px_rgba(139,92,246,0.8)]">
                            <span class="text-xs font-bold">1</span>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[16px] font-bold text-white truncate drop-shadow-sm">Texas Sun</div>
                        <div class="text-[13px] text-gray-400 mt-0.5">Leon Bridges</div>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </button>
                </div>

                <!-- Track 2 -->
                <div class="track-row rounded-2xl p-2.5 flex items-center gap-4 cursor-pointer">
                    <div class="relative w-12 h-12 shrink-0">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100&q=80" class="w-full h-full rounded-xl object-cover shadow-lg border border-white/10">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[15px] font-semibold text-gray-200 truncate">White Gloves</div>
                    </div>
                    <button class="w-8 h-8 rounded-full border border-white/30 text-white flex items-center justify-center shrink-0 hover:bg-white hover:text-black">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </button>
                </div>
                
                <!-- Track 3 -->
                <div class="track-row rounded-2xl p-2.5 flex items-center gap-4 cursor-pointer">
                    <div class="relative w-10 h-10 shrink-0">
                        <div class="w-full h-full rounded-xl bg-gray-800 border border-white/10 flex items-center justify-center">
                            <span class="text-[10px] text-gray-400">+3</span>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[14px] font-medium text-gray-400 italic">View all tracks</div>
                    </div>
                </div>

            </div>

            <!-- Footer Meta & Actions -->
            <div class="px-6 pt-8 pb-2 flex flex-col gap-6">
                <div class="text-[13px] text-purple-200/70 border-l-2 border-purple-500/50 pl-3 leading-relaxed">
                    Matched because you listen to Men I Trust and Leon Bridges
                </div>

                <div class="flex gap-3">
                    <button class="flex-1 bg-white/5 border border-white/10 text-gray-300 text-sm font-semibold h-14 rounded-2xl backdrop-blur-md hover:bg-white/10 hover:text-white transition-colors">👎 Pass</button>
                    <button class="flex-1 bg-[#8b5cf6] text-black text-sm font-bold h-14 rounded-2xl shadow-[0_4px_20px_rgba(139,92,246,0.6)] hover:bg-[#a78bfa] transition-colors">Save Artist</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
